services:
  - type: web
    name: digital-transformation-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Nhập tay trên Render dashboard (bí mật)
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: CLIENT_URL
        sync: false          # Nhập URL Vercel sau khi deploy frontend xong
      - key: SERVER_URL
        sync: false          # Render sẽ cấp URL sau khi deploy
    healthCheckPath: /api/health
